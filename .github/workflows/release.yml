name: Release

# 推 tag(v*)触发,出 Windows + macOS 安装包并上传到 GitHub Release。
# 也可在 Actions 页手动触发(workflow_dispatch)做一次不签名的构建验证。
on:
  push:
    tags:
      - "v*"
  workflow_dispatch:

permissions:
  contents: write

jobs:
  release:
    strategy:
      fail-fast: false
      matrix:
        include:
          # macOS:Apple Silicon + Intel 通用包(.dmg / .app)
          - platform: macos-latest
            args: "--target universal-apple-darwin"
          # Windows:.msi + NSIS(.exe)
          - platform: windows-latest
            args: ""

    runs-on: ${{ matrix.platform }}

    steps:
      - uses: actions/checkout@v4

      - name: Setup Node
        uses: actions/setup-node@v4
        with:
          node-version: 20

      - name: Install Rust stable
        uses: dtolnay/rust-toolchain@stable
        with:
          # macOS 通用包需要两个目标架构
          targets: ${{ matrix.platform == 'macos-latest' && 'aarch64-apple-darwin,x86_64-apple-darwin' || '' }}

      - name: Rust cache
        uses: swatinem/rust-cache@v2
        with:
          workspaces: "./src-tauri -> target"

      - name: Install frontend deps
        run: npm install

      - name: Build, sign & release
        uses: tauri-apps/tauri-action@v0
        env:
          GITHUB_TOKEN: ${{ secrets.GITHUB_TOKEN }}
          # ----- macOS 签名 + 公证(复用公司现有 Apple Developer 账号)-----
          APPLE_CERTIFICATE: ${{ secrets.APPLE_CERTIFICATE }}
          APPLE_CERTIFICATE_PASSWORD: ${{ secrets.APPLE_CERTIFICATE_PASSWORD }}
          APPLE_SIGNING_IDENTITY: ${{ secrets.APPLE_SIGNING_IDENTITY }}
          APPLE_ID: ${{ secrets.APPLE_ID }}
          APPLE_PASSWORD: ${{ secrets.APPLE_PASSWORD }}
          APPLE_TEAM_ID: ${{ secrets.APPLE_TEAM_ID }}
        with:
          tagName: ${{ github.ref_name }}
          releaseName: "ASHOT Creator Studio ${{ github.ref_name }}"
          releaseBody: "桌面客户端安装包(Windows / macOS)。"
          releaseDraft: true
          prerelease: false
          args: ${{ matrix.args }}
